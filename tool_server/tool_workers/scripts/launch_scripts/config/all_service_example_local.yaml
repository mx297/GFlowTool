# 基本目录配置 - 修改为您本地的路径
base_dir: /share_5/users/mohamed_atef/OpenThinkIMG/tool_server/tool_workers
log_folder: /share_5/users/mohamed_atef/OpenThinkIMG/tool_server/tool_workers/logs/server_log2

# 本地配置中这些参数不会被使用，但保留以保持结构一致
default_calculate_gpus: 1
default_calculate_cpus: 16
default_control_cpus: 2
default_control_gpus: 0
retry_interval: 1
request_timeout: 10

# 控制器配置
controller_config:
  worker_name: controller
  job_name: controller
  calculate_type: control
  cmd:
    script-addr: ./online_workers/controller.py
    port: 20201
    host: "0.0.0.0"
  # 可选：指定conda环境
  # conda_env: "your_env_name"

# 工具工作器配置
tool_worker_config:
  - Point:
      worker_name: Point
      job_name: point
      calculate_type: control
      # 本地GPU设备ID，根据您的硬件情况调整
      cuda_visible_devices: "5"
      conda_env: "molmo"
      cmd:
        script-addr: ./online_workers/molmo_point_worker.py
        port: 20127
        host: "0.0.0.0"
        model_path: "/share_5/users/mohamed_atef/OpenThinkIMG/models/Molmo-7B-D-0924"

  - SegmentRegionAroundPoint:
      worker_name: SegmentRegionAroundPoint
      job_name: sam2
      calculate_type: control
      cuda_visible_devices: "5"  # 可根据您的硬件修改
      cmd:
        script-addr: ./online_workers/SAMAroundPoint_worker.py
        port: 20136
        host: "0.0.0.0"
        sam2_checkpoint: /share_5/users/mohamed_atef/OpenThinkIMG/models/src/sam-2/checkpoints/sam2.1_hiera_large.pt
        sam2_model_cfg: /share_5/users/mohamed_atef/OpenThinkIMG/models/src/sam-2/sam2/configs/sam2.1/sam2.1_hiera_l.yaml
      
  - OCR:
      worker_name: OCR
      job_name: ocr
      calculate_type: control
      # 如果OCR需要GPU，可以指定设备ID
      cuda_visible_devices: "5"
      cmd:
        script-addr: ./online_workers/ocr_worker.py
        port: 20109
        host: "0.0.0.0"
  
  - GroundingDINO:
      worker_name: GroundingDINO
      job_name: groundingdino
      calculate_type: control
      cuda_visible_devices: "5"  # 可根据您的硬件修改
      cmd:
        script-addr: ./online_workers/grounding_dino_worker.py
        port: 20103
        host: "0.0.0.0"
        model-path: /share_5/users/mohamed_atef/OpenThinkIMG/models/groundingdino_swint_ogc.pth
        model-config: /share_5/users/mohamed_atef/OpenThinkIMG/models/GroundingDINO/groundingdino/config/GroundingDINO_SwinT_OGC.py

  - DrawHorizontalLineByY:
      worker_name: DrawHorizontalLineByY
      job_name: drawliney
      calculate_type: control
      cmd:
        script-addr: ./online_workers/DrawHorizontalLineByY_worker.py
        port: 20132
        host: "0.0.0.0"

  - DrawVerticalLineByX:
      worker_name: DrawVerticalLineByX
      job_name: drawlinex
      calculate_type: control
      cmd:
        script-addr: ./online_workers/DrawVerticalLineByX_worker.py
        port: 20189
        host: "0.0.0.0"

  - ZoomInSubfigure:
      worker_name: ZoomInSubfigure
      job_name: SelectSubplot
      calculate_type: control
      cmd:
        script-addr: ./online_workers/SelectSubplot_worker.py
        port: 20139
        host: "0.0.0.0"

  